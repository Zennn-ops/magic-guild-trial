<title>Magic Guild Trial</title>
<style>
/* Clean system font stack — works great on all Android/iOS devices */
@font-face{font-family:'Fredoka One';font-style:normal;font-weight:400;
  src:local('Fredoka One'),local('FredokaOne-Regular'),local('Nunito'),local('Nunito Regular');}
@font-face{font-family:'Nunito';font-style:normal;font-weight:400;
  src:local('Nunito'),local('Nunito Regular'),local('Roboto'),local('Arial');}
@font-face{font-family:'Nunito';font-style:normal;font-weight:700;
  src:local('Nunito Bold'),local('Nunito-Bold'),local('Roboto Bold'),local('Arial Bold');}
/* If no custom font found, fall back to clean readable system fonts */
:root{
  --game-display: 'Fredoka One','Nunito','Roboto','Arial Rounded MT Bold',Arial,sans-serif;
  --game-body: 'Nunito','Roboto','Segoe UI',Arial,sans-serif;
}

/* ── OFFLINE BANNER ── */
#offlineBanner{position:fixed;top:0;left:0;width:100%;z-index:9999;background:#b45309;color:#fff;font-family:var(--game-body,'Nunito',sans-serif);font-size:13px;font-weight:700;text-align:center;padding:8px 16px;letter-spacing:.5px;opacity:0;pointer-events:none;transition:opacity 0.6s ease;}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#111827;overflow:hidden;}

/* ── PHONE FRAME (desktop) ── */
.phone-wrap{display:flex;justify-content:center;align-items:flex-start;padding:24px 16px;min-height:100vh;background:#111827;}
.phone{width:375px;height:780px;background:#0f0c29;border-radius:44px;border:10px solid #1f2937;box-shadow:0 0 0 2px #374151,0 30px 80px rgba(0,0,0,.8),inset 0 0 0 1px rgba(255,255,255,.05);overflow:hidden;position:relative;display:flex;flex-direction:column;}
.notch{width:120px;height:28px;background:#1f2937;border-radius:0 0 18px 18px;margin:0 auto;z-index:10;flex-shrink:0;}

/* ── FULL SCREEN on real phones ── */
@media(max-width:430px){
  body{overflow:hidden;}
  .phone-wrap{padding:0;min-height:100dvh;align-items:stretch;}
  .phone{width:100%;height:100dvh;border-radius:0;border:none;box-shadow:none;}
  .notch,.home-bar{display:none;}
}

.screen{flex:1;overflow-y:auto;overflow-x:hidden;background:linear-gradient(160deg,#1a1040 0%,#2d1b69 55%,#0f4c3a 100%);position:relative;scrollbar-width:none;}
.screen::-webkit-scrollbar{display:none;}
.home-bar{height:20px;background:#1f2937;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.home-indicator{width:100px;height:4px;background:#4b5563;border-radius:4px;}
.stars-bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 2s infinite alternate;}

@keyframes twinkle{from{opacity:.1}to{opacity:.9}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes popIn{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes glowPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.2)}}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(-18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes bossShake{0%,100%{transform:scale(1.1)}25%{transform:translateX(-10px) scale(1.1)}75%{transform:translateX(10px) scale(1.1)}}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0) rotate(var(--pr))}}
@keyframes levelUp{0%{transform:scale(0) rotate(-10deg);opacity:0}50%{transform:scale(1.2) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes streakBounce{0%,100%{transform:scale(1)}40%{transform:scale(1.3)}70%{transform:scale(.9)}}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes lockWiggle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes nameSlide{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes installPop{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}

.content{position:relative;z-index:1;padding:14px 14px 80px;}
.title{font-family:var(--game-display,'Fredoka One',cursive);font-size:24px;color:#FFD700;text-shadow:0 0 16px #FFD70066,2px 2px 0 #6B3A00;text-align:center;margin-bottom:2px;animation:pulse 3s ease-in-out infinite;}
.title-sub{font-family:var(--game-body,'Nunito',sans-serif);font-size:11px;color:#a78bfa;text-align:center;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;opacity:.85;}
.card{background:rgba(255,255,255,.07);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,.13);border-radius:20px;padding:16px 14px;margin-bottom:12px;animation:slideUp .35s ease;font-family:var(--game-body,'Nunito',sans-serif);}
.hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:5px;}
.hud-stat{background:rgba(255,255,255,.11);border-radius:40px;padding:5px 11px;color:white;font-weight:700;font-size:12px;display:flex;align-items:center;gap:4px;font-family:var(--game-body,'Nunito',sans-serif);}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;}
.icon-btn{font-family:var(--game-display,'Fredoka One',cursive);font-size:13px;padding:8px 14px;border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:transform .15s;white-space:nowrap;color:#fff;text-shadow:1px 1px 2px rgba(0,0,0,.5);}
.icon-btn:active{transform:scale(.92) translateY(1px);}
.back-btn{background:#7c3aed;box-shadow:0 4px 0 #4c1d95,0 0 14px #7c3aedaa;animation:glowPulse 2.5s ease-in-out infinite;}
.save-btn{background:#d97706;box-shadow:0 4px 0 #92400e,0 0 14px #f59e0baa;animation:glowPulse 2.5s ease-in-out infinite;}
.music-btn{position:absolute;bottom:28px;right:16px;z-index:300;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:transform .15s;box-shadow:0 0 12px rgba(168,139,250,.5);}
.music-btn:active{transform:scale(.88);}
.diff-btn{width:100%;font-family:var(--game-display,'Fredoka One',cursive);font-size:17px;border:none;border-radius:16px;padding:14px 16px;margin-bottom:10px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;gap:10px;text-shadow:0 1px 3px rgba(0,0,0,.5);transition:transform .15s;position:relative;overflow:hidden;}
.diff-btn:active{transform:translateY(2px);}
.btn-easy{background:#16a34a;box-shadow:0 4px 0 #14532d,0 0 16px #22c55eaa;animation:glowPulse 2s ease-in-out infinite;}
.btn-medium{background:#ea580c;box-shadow:0 4px 0 #7c2d12,0 0 16px #fb923caa;animation:glowPulse 2.2s ease-in-out infinite;}
.btn-hard{background:#dc2626;box-shadow:0 4px 0 #7f1d1d,0 0 16px #f87171aa;animation:glowPulse 1.8s ease-in-out infinite;}
.locked-btn{background:#374151!important;box-shadow:0 4px 0 #1f2937!important;animation:none!important;cursor:not-allowed;opacity:.7;}
.lock-badge{position:absolute;right:14px;font-size:18px;animation:lockWiggle 2s ease-in-out infinite;}
.passage-box{background:rgba(255,255,255,.06);border-left:3px solid #FFD700;border-radius:0 12px 12px 0;padding:11px 13px;margin-bottom:12px;color:#E8D5FF;font-size:13px;line-height:1.65;font-family:var(--game-body,'Nunito',sans-serif);}
.question-text{color:#FFD700;font-family:var(--game-display,'Fredoka One',cursive);font-size:16px;text-align:center;margin-bottom:12px;text-shadow:0 0 10px #FFD70044;}
.option-btn{width:100%;font-family:var(--game-body,'Nunito',sans-serif);font-weight:700;font-size:14px;padding:12px 13px;margin-bottom:8px;border:none;border-radius:14px;color:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:transform .15s;text-shadow:0 1px 2px rgba(0,0,0,.4);}
.option-btn:active{transform:scale(.97);}
.opt-a{background:#1d4ed8;box-shadow:0 3px 0 #1e3a8a,0 0 12px #60a5faaa;animation:glowPulse 2.4s ease-in-out infinite;}
.opt-b{background:#15803d;box-shadow:0 3px 0 #14532d,0 0 12px #4ade80aa;animation:glowPulse 2.1s ease-in-out infinite;}
.opt-c{background:#7e22ce;box-shadow:0 3px 0 #4c1d95,0 0 12px #c084fcaa;animation:glowPulse 2.6s ease-in-out infinite;}
.opt-d{background:#b91c1c;box-shadow:0 3px 0 #7f1d1d,0 0 12px #f87171aa;animation:glowPulse 2.3s ease-in-out infinite;}
.option-btn.correct{background:#065f46!important;box-shadow:0 0 24px #10b981,0 0 55px #10b98177!important;animation:popIn .3s ease!important;}
.option-btn.wrong{background:#7f1d1d!important;box-shadow:0 0 20px #ef4444!important;animation:shake .4s ease!important;}
.option-letter{background:rgba(255,255,255,.2);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.prog-wrap{margin-bottom:12px;}
.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.prog-meta span{color:#C8B6FF;font-size:11px;font-family:var(--game-body,'Nunito',sans-serif);}
.prog-meta b{color:#FFD700;font-size:11px;font-family:var(--game-body,'Nunito',sans-serif);}
.prog-bg{background:rgba(255,255,255,.08);border-radius:20px;height:7px;overflow:hidden;}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#6c63ff,#FFD700);transition:width .4s ease;box-shadow:0 0 6px #FFD70066;}
.streak-bar{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:10px;}
.streak-dot{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.2);transition:all .3s;}
.streak-dot.lit{background:#FFD700;border-color:#FFD700;box-shadow:0 0 8px #FFD700,0 0 20px #FFD70066;animation:streakBounce .4s ease;}
.streak-label{color:#C8B6FF;font-size:11px;font-family:var(--game-body,'Nunito',sans-serif);margin-right:4px;}
.timer-ring{text-align:center;margin-bottom:8px;}
.timer-num{font-family:var(--game-display,'Fredoka One',cursive);font-size:22px;color:white;}
.timer-num.danger{color:#f87171;animation:timerPulse .5s ease-in-out infinite;}
.timer-track{background:rgba(255,255,255,.1);border-radius:20px;height:6px;overflow:hidden;margin-bottom:10px;}
.hint-btn{background:rgba(255,215,0,.15);border:1.5px solid rgba(255,215,0,.4);border-radius:12px;color:#FFD700;font-family:var(--game-display,'Fredoka One',cursive);font-size:13px;padding:7px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:transform .15s;width:100%;justify-content:center;margin-bottom:10px;}
.hint-btn:active{transform:scale(.95);}
.hint-box{background:rgba(255,215,0,.08);border:1.5px solid rgba(255,215,0,.3);border-radius:14px;padding:10px 14px;color:#FFF9C4;font-size:13px;font-family:var(--game-body,'Nunito',sans-serif);margin-bottom:10px;animation:slideDown .3s ease;line-height:1.5;}
.explain-box{background:rgba(100,255,150,.07);border:1.5px solid rgba(100,255,150,.3);border-radius:14px;padding:10px 14px;color:#bbf7d0;font-size:13px;font-family:var(--game-body,'Nunito',sans-serif);margin-bottom:10px;animation:slideDown .3s ease;line-height:1.5;}
.explain-wrong{background:rgba(255,100,100,.07);border:1.5px solid rgba(255,100,100,.3);border-radius:14px;padding:10px 14px;color:#fecaca;font-size:13px;font-family:var(--game-body,'Nunito',sans-serif);margin-bottom:10px;animation:slideDown .3s ease;line-height:1.5;}
.daily-btn{background:linear-gradient(135deg,#f59e0b,#ef4444);box-shadow:0 4px 0 #92400e,0 0 18px #f59e0baa;animation:glowPulse 1.9s ease-in-out infinite;}
.boss-area{text-align:center;margin-bottom:12px;}
.boss-emoji{font-size:52px;display:inline-block;filter:drop-shadow(0 0 18px rgba(255,80,80,.9));animation:pulse 1.5s ease-in-out infinite;}
.boss-emoji.shaking{animation:bossShake .4s ease;}
.boss-name{font-family:var(--game-display,'Fredoka One',cursive);font-size:18px;color:#FF6B6B;text-shadow:0 0 12px #FF6B6B88;}
.hp-label{color:#FFA07A;font-size:11px;font-weight:700;margin:5px 0 3px;font-family:var(--game-body,'Nunito',sans-serif);}
.hp-bg{background:rgba(255,255,255,.1);border-radius:20px;height:14px;overflow:hidden;}
.hp-fill{height:100%;border-radius:20px;transition:width .5s ease;background:linear-gradient(90deg,#e74c3c,#ff6b6b);box-shadow:0 0 10px #ef444466;}
.phase-banner{background:linear-gradient(135deg,#FF4500,#FF6B6B);border-radius:14px;padding:9px 14px;text-align:center;color:white;font-family:var(--game-display,'Fredoka One',cursive);font-size:16px;margin-bottom:10px;animation:popIn .4s ease;box-shadow:0 0 28px rgba(255,100,0,.5);}
.summary-card{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.13);border-radius:20px;padding:20px 16px;margin-bottom:12px;text-align:center;animation:popIn .5s ease;font-family:var(--game-body,'Nunito',sans-serif);}
.summary-title{font-family:var(--game-display,'Fredoka One',cursive);font-size:22px;color:#FFD700;margin-bottom:4px;}
.summary-sub{color:#C8B6FF;font-size:12px;margin-bottom:16px;}
.summary-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.summary-stat{background:rgba(255,255,255,.08);border-radius:14px;padding:10px;}
.summary-stat-val{font-family:var(--game-display,'Fredoka One',cursive);font-size:24px;color:#FFD700;}
.summary-stat-lbl{font-size:11px;color:#C8B6FF;}
.levelup-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:400;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease;}
.levelup-box{background:linear-gradient(135deg,#4c1d95,#1e3a8a);border:2px solid #FFD700;border-radius:24px;padding:28px 24px;text-align:center;animation:levelUp .5s ease;box-shadow:0 0 40px #FFD70088;margin:16px;}
.levelup-emoji{font-size:60px;display:block;margin-bottom:8px;}
.levelup-title{font-family:var(--game-display,'Fredoka One',cursive);font-size:28px;color:#FFD700;text-shadow:0 0 20px #FFD700;margin-bottom:4px;}
.levelup-sub{color:#C8B6FF;font-size:14px;margin-bottom:18px;font-family:var(--game-body,'Nunito',sans-serif);}
.levelup-ok{font-family:var(--game-display,'Fredoka One',cursive);font-size:17px;padding:12px 32px;border:none;border-radius:50px;background:#FFD700;color:#1a1040;cursor:pointer;box-shadow:0 4px 0 #b45309;}
.name-input{width:100%;font-family:var(--game-display,'Fredoka One',cursive);font-size:18px;padding:14px 16px;border-radius:16px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:white;text-align:center;outline:none;margin-bottom:14px;}
.name-input::placeholder{color:rgba(255,255,255,.4);}
.name-input:focus{border-color:#FFD700;box-shadow:0 0 12px #FFD70055;}
.name-greet{font-family:var(--game-display,'Fredoka One',cursive);font-size:15px;color:#C8B6FF;text-align:center;margin-bottom:14px;animation:nameSlide .4s ease;}
.result-screen{text-align:center;padding:12px 0;}
.result-emoji{font-size:64px;display:block;margin-bottom:10px;}
.result-title{font-family:var(--game-display,'Fredoka One',cursive);font-size:28px;margin-bottom:6px;}
.result-msg{color:#C8B6FF;font-size:13px;margin-bottom:14px;line-height:1.6;font-family:var(--game-body,'Nunito',sans-serif);}
.result-xp{background:rgba(255,215,0,.12);border:1.5px solid #FFD700;border-radius:14px;padding:9px 18px;display:inline-block;color:#FFD700;font-weight:700;font-size:15px;margin-bottom:16px;font-family:var(--game-body,'Nunito',sans-serif);box-shadow:0 0 12px #FFD70055;}
.play-btn{font-family:var(--game-display,'Fredoka One',cursive);font-size:17px;padding:13px 34px;border:none;border-radius:50px;background:#6c63ff;color:white;cursor:pointer;box-shadow:0 5px 0 #4730c4,0 0 18px #6c63ffaa;animation:glowPulse 2s ease-in-out infinite;}
.play-btn:active{transform:translateY(2px);}

.profile-btn{position:absolute;top:36px;right:58px;z-index:300;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:transform .15s;box-shadow:0 0 12px rgba(168,139,250,.4);}
.profile-btn:active{transform:scale(.88);}
.avatar-ring{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#FFD700);padding:3px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px #7c3aed88;}
.avatar-inner{width:64px;height:64px;border-radius:50%;background:#1a0840;display:flex;align-items:center;justify-content:center;font-size:30px;}
.profile-name{font-family:var(--game-display,'Fredoka One',cursive);font-size:22px;color:#FFD700;text-align:center;text-shadow:0 0 12px #FFD70066;}
.profile-title{font-family:var(--game-body,'Nunito',sans-serif);font-size:12px;color:#a78bfa;text-align:center;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;}
.rank-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:30px;font-family:var(--game-display,'Fredoka One',cursive);font-size:14px;margin:0 auto 16px;display:flex;justify-content:center;width:fit-content;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-box{background:rgba(255,255,255,.07);border-radius:14px;padding:10px;text-align:center;border:1.5px solid rgba(255,255,255,.1);}
.stat-val{font-family:var(--game-display,'Fredoka One',cursive);font-size:22px;color:#FFD700;}
.stat-lbl{font-family:var(--game-body,'Nunito',sans-serif);font-size:10px;color:#C8B6FF;margin-top:2px;text-transform:uppercase;letter-spacing:.8px;}
.milestones{margin-bottom:14px;}
.milestone-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.07);}
.milestone-icon{font-size:20px;flex-shrink:0;}
.milestone-info{flex:1;}
.milestone-name{font-family:var(--game-body,'Nunito',sans-serif);font-size:13px;color:white;font-weight:700;}
.milestone-desc{font-family:var(--game-body,'Nunito',sans-serif);font-size:11px;color:#C8B6FF;}
.milestone-lock{font-size:11px;color:#6b7280;}
.edit-name-btn{width:100%;font-family:var(--game-display,'Fredoka One',cursive);font-size:14px;padding:10px;border:1.5px solid rgba(255,255,255,.2);border-radius:12px;background:rgba(255,255,255,.08);color:#C8B6FF;cursor:pointer;margin-bottom:8px;}
.edit-name-btn:active{transform:scale(.97);}
.danger-btn{width:100%;font-family:var(--game-display,'Fredoka One',cursive);font-size:14px;padding:10px;border:1.5px solid rgba(239,68,68,.3);border-radius:12px;background:rgba(239,68,68,.1);color:#f87171;cursor:pointer;}
.danger-btn:active{transform:scale(.97);}

.best-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);border-radius:20px;padding:3px 10px;font-size:11px;color:#FFD700;font-family:var(--game-body,'Nunito',sans-serif);font-weight:700;margin-left:6px;}
.fx-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;overflow:hidden;}
.spark{position:absolute;pointer-events:none;border-radius:50%;}
.screen-flash{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99;border-radius:34px;}
.feedback-toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:white;border-radius:20px;padding:12px 24px;text-align:center;font-family:var(--game-display,'Fredoka One',cursive);font-size:20px;z-index:200;transition:transform .18s;box-shadow:0 10px 40px rgba(0,0,0,.5);pointer-events:none;white-space:nowrap;}
.feedback-toast.show{transform:translate(-50%,-50%) scale(1);}
.save-indicator{position:absolute;top:35px;right:14px;background:rgba(255,215,0,.9);color:#6B3A00;font-family:var(--game-display,'Fredoka One',cursive);font-size:12px;padding:5px 12px;border-radius:20px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;}
.save-indicator.show{opacity:1;}
.diff-badge{display:inline-block;font-family:var(--game-display,'Fredoka One',cursive);font-size:11px;padding:3px 10px;border-radius:20px;}
.badge-easy{background:rgba(22,163,74,.25);color:#86efac;}
.badge-medium{background:rgba(234,88,12,.25);color:#fdba74;}
.badge-hard{background:rgba(220,38,38,.25);color:#fca5a5;}

/* ── INSTALL PROMPT ── */
#installPrompt{position:absolute;bottom:0;left:0;right:0;background:#0f0726;border-top:2px solid #7c3aed;border-radius:24px 24px 0 0;padding:20px 18px 28px;z-index:600;display:none;animation:installPop .35s ease;box-shadow:0 -8px 40px rgba(124,58,237,.5);}
@keyframes installPop{from{transform:translateY(100%)}to{transform:translateY(0)}}
#installPrompt .install-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
#installPrompt .install-icon{width:52px;height:52px;border-radius:14px;overflow:hidden;flex-shrink:0;box-shadow:0 0 16px rgba(124,58,237,.6);}
#installPrompt .install-icon img{width:100%;height:100%;object-fit:cover;}
#installPrompt .install-titles{flex:1;}
#installPrompt .install-name{font-family:var(--game-display,'Fredoka One',cursive);font-size:16px;color:#FFD700;}
#installPrompt .install-sub{font-size:12px;color:#a78bfa;font-family:var(--game-body,'Nunito',sans-serif);margin-top:2px;}
#installPrompt .install-desc{color:#C8B6FF;font-family:var(--game-body,'Nunito',sans-serif);font-size:13px;margin-bottom:16px;line-height:1.6;}
#installPrompt .install-features{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px;}
#installPrompt .install-feat{background:rgba(255,255,255,.06);border-radius:10px;padding:7px 10px;font-size:12px;color:#E8D5FF;font-family:var(--game-body,'Nunito',sans-serif);display:flex;align-items:center;gap:6px;}
#installPrompt .install-btns{display:flex;gap:10px;}
#installPrompt .btn-install{flex:2;font-family:var(--game-display,'Fredoka One',cursive);font-size:16px;padding:13px;border:none;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#FFD700);color:white;cursor:pointer;box-shadow:0 4px 0 #4c1d95,0 0 20px rgba(124,58,237,.5);text-shadow:0 1px 3px rgba(0,0,0,.5);}
#installPrompt .btn-dismiss{flex:1;font-family:var(--game-display,'Fredoka One',cursive);font-size:14px;padding:13px;border:1.5px solid rgba(255,255,255,.15);border-radius:14px;background:transparent;color:#9ca3af;cursor:pointer;}
</style>

// ═══ OFFLINE DETECTION — fades in/out, auto-hides after 4s ═══
let _offlineTimer = null;
function updateOnlineStatus() {
  const banner = document.getElementById('offlineBanner');
  if (!banner) return;
  if (!navigator.onLine) {
    clearTimeout(_offlineTimer);
    banner.style.opacity = '1';
    banner.style.pointerEvents = 'auto';
    // Auto-fade after 4 seconds
    _offlineTimer = setTimeout(() => {
      banner.style.opacity = '0';
      banner.style.pointerEvents = 'none';
    }, 4000);
  } else {
    clearTimeout(_offlineTimer);
    banner.style.opacity = '0';
    banner.style.pointerEvents = 'none';
  }
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ═══ INSTALL PROMPT (PWA) ═══
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install prompt after player enters name (not immediately)
  setTimeout(() => {
    if (deferredPrompt && S.phase === 'start') {
      document.getElementById('installPrompt').style.display = 'block';
    }
  }, 3000);
});
function doInstall() {
  dismissInstall();
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
}
function dismissInstall() {
  document.getElementById('installPrompt').style.display = 'none';
}
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  dismissInstall();
  sfxVictory();
  const ov=document.getElementById('levelupOverlay');
  ov.style.display='flex';
  ov.innerHTML=`<div class="levelup-overlay"><div class="levelup-box" style="text-align:center;">
    <span class="levelup-emoji">🎉</span>
    <div class="levelup-title">App Installed!</div>
    <div class="levelup-sub" style="margin-bottom:16px;">Magic Guild Trial is now on your home screen!<br>Open it anytime — even without internet.</div>
    <button class="levelup-ok" onclick="dismissLevelUp()">Let's Play!</button>
  </div></div>`;
});

// ═══ AUDIO ═══
let AC=null,musicPlaying=false,musicInterval=null,musicStarted=false,musicGain=null,melIdx=0,bassIdx=0,chordIdx=0;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function playTone(f,t,d,v,delay=0){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=t;o.frequency.setValueAtTime(f,ac.currentTime+delay);g.gain.setValueAtTime(0,ac.currentTime+delay);g.gain.linearRampToValueAtTime(v,ac.currentTime+delay+.01);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+delay+d);o.start(ac.currentTime+delay);o.stop(ac.currentTime+delay+d+.05);}catch(e){}}
function playNoise(d,v,delay=0){try{const ac=getAC(),buf=ac.createBuffer(1,ac.sampleRate*d,ac.sampleRate),data=buf.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;const s=ac.createBufferSource(),g=ac.createGain(),flt=ac.createBiquadFilter();flt.type='bandpass';flt.frequency.value=800;s.buffer=buf;s.connect(flt);flt.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(v,ac.currentTime+delay);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+delay+d);s.start(ac.currentTime+delay);s.stop(ac.currentTime+delay+d+.05);}catch(e){}}
function sfxClick(){playTone(520,'sine',.08,.15);playTone(780,'sine',.06,.08,.03);}
function sfxCorrect(){[523,659,784,1047].forEach((f,i)=>playTone(f,'sine',.18,.2,i*.08));playTone(1047,'triangle',.3,.15,.32);}
function sfxWrong(){playTone(220,'sawtooth',.15,.2);playTone(180,'sawtooth',.2,.18,.12);playNoise(.1,.05);}

const MELODY=[[392,.4],[440,.2],[494,.2],[523,.4],[494,.2],[440,.4],[392,.4],[349,.2],[392,.2],[440,.6],[523,.4],[587,.2],[659,.2],[698,.4],[659,.2],[587,.4],[523,.4],[494,.2],[440,.2],[392,.8]];
const BASS=[196,196,220,220,175,175,196,196,220,220,246,246,262,262,220,220];
const CHORD_FREQS=[[261,329,392],[220,277,330],[196,247,294],[246,311,370]];
function startMusic(){if(musicStarted)return;musicStarted=true;musicPlaying=true;document.getElementById('musicBtn').textContent='🎵';mloop();}
function mloop(){if(!musicPlaying)return;try{const ac=getAC();if(!musicGain){musicGain=ac.createGain();musicGain.gain.value=.06;musicGain.connect(ac.destination);}const now=ac.currentTime,[mf,md]=MELODY[melIdx%MELODY.length];const mo=ac.createOscillator(),mg=ac.createGain();mo.connect(mg);mg.connect(musicGain);mo.type='triangle';mo.frequency.value=mf;mg.gain.setValueAtTime(.7,now);mg.gain.linearRampToValueAtTime(0,now+md);mo.start(now);mo.stop(now+md);melIdx++;if(melIdx%2===0){const bo=ac.createOscillator(),bg=ac.createGain();bo.connect(bg);bg.connect(musicGain);bo.type='sine';bo.frequency.value=BASS[bassIdx%BASS.length];bg.gain.setValueAtTime(.4,now);bg.gain.exponentialRampToValueAtTime(.001,now+.5);bo.start(now);bo.stop(now+.6);bassIdx++;}if(melIdx%8===0){CHORD_FREQS[chordIdx%CHORD_FREQS.length].forEach(cf=>{const co=ac.createOscillator(),cg=ac.createGain();co.connect(cg);cg.connect(musicGain);co.type='sine';co.frequency.value=cf;cg.gain.setValueAtTime(0,now);cg.gain.linearRampToValueAtTime(.15,now+.3);cg.gain.linearRampToValueAtTime(0,now+2);co.start(now);co.stop(now+2.1);});chordIdx++;}if(melIdx%4===0){[1047,1175,1319,1568].forEach((sf,si)=>{const so=ac.createOscillator(),sg=ac.createGain();so.connect(sg);sg.connect(musicGain);so.type='sine';so.frequency.value=sf;const sd=.05+si*.03;sg.gain.setValueAtTime(0,now+sd);sg.gain.linearRampToValueAtTime(.08,now+sd+.04);sg.gain.exponentialRampToValueAtTime(.001,now+sd+.15);so.start(now+sd);so.stop(now+sd+.2);});}musicInterval=setTimeout(mloop,md*1000);}catch(e){}}
function stopMusic(){musicPlaying=false;clearTimeout(musicInterval);if(musicGain){try{musicGain.gain.linearRampToValueAtTime(0,getAC().currentTime+.3);}catch(e){}setTimeout(()=>{musicGain=null;musicStarted=false;},400);}}
function toggleMusic(){sfxClick();if(musicPlaying){stopMusic();document.getElementById('musicBtn').textContent='🔇';}else{musicStarted=false;startMusic();document.getElementById('musicBtn').textContent='🎵';}}

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function pick(pool,n){return shuffle(pool).slice(0,n);}

function renderName(c){c.innerHTML=`<div class="title">✨ Magic Guild Trial ✨</div><div class="title-sub">A reading comprehension quest</div><div class="card"><div style="font-size:40px;text-align:center;margin-bottom:12px;">🧙‍♂️</div><div style="color:#C8B6FF;text-align:center;font-size:13px;margin-bottom:14px;font-family:var(--game-body,'Nunito',sans-serif);">Welcome, brave hero! What is your name?</div><input class="name-input" id="nameInput" placeholder="Enter your name..." maxlength="16" value="${S.playerName}" onkeydown="if(event.key==='Enter')confirmName()"><button class="diff-btn btn-easy" style="margin-top:4px;" onclick="confirmName()">⚔️ Begin Quest!</button></div>`;setTimeout(()=>document.getElementById('nameInput')?.focus(),100);}
function confirmName(){sfxClick();const val=document.getElementById('nameInput')?.value.trim();if(!val){toast('Enter your name!','#f59e0b');return;}S.playerName=val;S.phase='start';if(!musicStarted)startMusic();doSave();render();setTimeout(()=>{if(deferredPrompt)document.getElementById('installPrompt').style.display='block';},2000);}
function getDailyPool(){
  const today=new Date().toISOString().slice(0,10);
  const seed=today.split('-').reduce((a,b)=>a*100+parseInt(b),0);
  const all=[...QBANK.easy,...QBANK.medium,...QBANK.hard];
  const seeded=all.map((q,i)=>({q,sort:(seed*(i+1)*2654435761)>>>0})).sort((a,b)=>a.sort-b.sort);
  return seeded.slice(0,8).map(x=>x.q);
}
function startDaily(){
  if(!musicStarted)startMusic();
  S.diff='daily';
  S.qs=getDailyPool();
  S.qi=0;S.phase='question';S.busy=false;S.roundCorrect=0;S.roundWrong=0;S.hintsLeft=1;S.hintUsed=false;
  render();
}
function renderStart(c){checkUnlocks();const dailyLabel=S.dailyDone?'✅ Daily Done — Score: '+S.dailyScore+'/8':'📅 Daily Challenge';const dailyClass=S.dailyDone?'locked-btn':'daily-btn';c.innerHTML=`<div class="title">✨ Magic Guild Trial ✨</div><div class="title-sub">Reading Comprehension Quest</div><div class="name-greet">Welcome back, ${S.playerName}! 🌟</div><div class="card"><div class="hud" style="justify-content:center;gap:10px;"><div class="hud-stat">${xpStat()} XP</div><div class="hud-stat">${hearts()}</div><div class="hud-stat">⭐ Lv.${S.level}</div></div><div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;"><div style="color:#C8B6FF;font-size:12px;font-family:var(--game-body,'Nunito',sans-serif);">Best Streak:</div><div class="best-badge">🔥 ${S.bestStreak}</div></div><div style="color:#C8B6FF;text-align:center;font-size:12px;margin-bottom:10px;font-family:var(--game-body,'Nunito',sans-serif);">Choose your challenge:</div><button class="diff-btn ${dailyClass}" onclick="sfxClick();${S.dailyDone?'toast(\'Come back tomorrow for a new challenge!\',\'#f59e0b\')':'startDaily()'}"> ${dailyLabel}</button><button class="diff-btn btn-easy" onclick="sfxClick();startGame('easy')">🌱 Easy — Beginner Quests</button><button class="diff-btn btn-medium ${S.unlockedDiffs.medium?'':'locked-btn'}" onclick="${S.unlockedDiffs.medium?'sfxClick();startGame(\'medium\')':'sfxClick();toast(\'Reach '+S.xpForDiffs.medium+' XP to unlock!\',\'#f59e0b\')'}">🔮 Medium — Enchanted Riddles${!S.unlockedDiffs.medium?'<span class="lock-badge">🔒</span>':''}</button><button class="diff-btn btn-hard ${S.unlockedDiffs.hard?'':'locked-btn'}" onclick="${S.unlockedDiffs.hard?'sfxClick();startGame(\'hard\')':'sfxClick();toast(\'Reach '+S.xpForDiffs.hard+' XP to unlock!\',\'#f59e0b\')'}">🐉 Hard — Ancient Trials${!S.unlockedDiffs.hard?'<span class="lock-badge">🔒</span>':''}</button></div><div style="color:rgba(255,255,255,.2);text-align:center;font-size:10px;font-family:var(--game-body,'Nunito',sans-serif);">Medium unlocks at ${S.xpForDiffs.medium} XP · Hard unlocks at ${S.xpForDiffs.hard} XP</div>
    `;
  if(deferredPrompt){const ib=document.createElement('button');ib.textContent='Install as App';ib.style.cssText='width:100%;margin-top:12px;font-family:Fredoka One,cursive;font-size:15px;padding:12px;border:2px solid rgba(255,215,0,.4);border-radius:14px;background:rgba(255,215,0,.1);color:#FFD700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;';ib.onclick=function(){sfxClick();doInstall();};c.appendChild(ib);}
}

const OPT_CLASS=['opt-a','opt-b','opt-c','opt-d'];
function renderQ(c){const q=S.qs[S.qi],pct=(S.qi/S.qs.length)*100,L=['A','B','C','D'];const diffLabel={'easy':'EASY','medium':'MEDIUM','hard':'HARD','daily':'DAILY'}[S.diff]||S.diff.toUpperCase();const badgeClass={'easy':'badge-easy','medium':'badge-medium','hard':'badge-hard','daily':'badge-medium'}[S.diff]||'badge-easy';const hasTimer=getTimerMax(S.diff)>0;c.innerHTML=`${topBar('goBack()')}<div class="prog-wrap"><div class="prog-meta"><span>Q${S.qi+1}/${S.qs.length}</span><b class="diff-badge ${badgeClass}">${diffLabel}</b></div><div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div></div>${streakBar()}${hasTimer?timerBlock():''}<div id="explainArea"></div><div class="card"><div style="font-size:32px;text-align:center;margin-bottom:8px;">${q.e||'📜'}</div><div class="passage-box">${q.p}</div><div class="question-text">${q.q}</div>${q.o.map((o,i)=>`<button class="option-btn ${OPT_CLASS[i]}" id="o${i}" onclick="sfxClick();answer(${i})"><span class="option-letter">${L[i]}</span>${o}</button>`).join('')}</div>${S.hintsLeft>0&&!S.hintUsed?`<button class="hint-btn" onclick="useHint()">💡 Use Hint (${S.hintsLeft} left)</button>`:''}${S.hintUsed&&q.hint?`<div class="hint-box">💡 <b>Hint:</b> ${q.hint}</div>`:''}`;if(hasTimer)startTimer();}
function showExplanation(correct,ex,onNext){
  const area=document.getElementById('explainArea');
  if(!area)return;
  if(correct){
    // Correct: just show a small green note, no button needed (auto-advances)
    if(ex) area.innerHTML=`<div class="explain-box">✅ <b>Why correct:</b> ${ex}</div>`;
  } else {
    // Wrong: show explanation + a Next button the user must tap
    const exHtml=ex?`<div class="explain-wrong">❌ <b>Why wrong:</b> ${ex}</div>`:`<div class="explain-wrong">❌ <b>Incorrect.</b> The correct answer is highlighted above.</div>`;
    const nextBtn=`<button onclick="window._nextQ && window._nextQ()" style="width:100%;margin-top:8px;font-family:var(--game-display,sans-serif);font-size:16px;font-weight:700;padding:13px;border:none;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:white;cursor:pointer;box-shadow:0 4px 0 #4c1d95;display:flex;align-items:center;justify-content:center;gap:8px;">Got it — Next Question ➜</button>`;
    area.innerHTML=exHtml+nextBtn;
    area.scrollIntoView({behavior:'smooth',block:'nearest'});
    window._nextQ=function(){window._nextQ=null;if(onNext)onNext();};
  }
}
function renderBoss(c){const q=S.qs[S.qi],L=['A','B','C','D'];c.innerHTML=`${topBar('goBack()')}<div class="boss-area"><div class="boss-emoji" id="bossEmoji">🧙‍♂️</div><div class="boss-name">⚡ The Archmage ⚡</div><div class="hp-label">Boss HP: ${S.bossHp}/100</div><div class="hp-bg"><div class="hp-fill" id="hpFill" style="width:${S.bossHp}%"></div></div></div>${streakBar()}${timerBlock()}${S.phase2?'<div class="phase-banner">🔥 PHASE 2 — FINAL CHALLENGE! 🔥</div>':''}<div class="card"><div style="font-size:28px;text-align:center;margin-bottom:8px;">${q.e||'🧙'}</div><div class="passage-box">${q.p}</div><div class="question-text">${q.q}</div>${q.o.map((o,i)=>`<button class="option-btn ${OPT_CLASS[i]}" id="o${i}" onclick="sfxClick();answer(${i})"><span class="option-letter">${L[i]}</span>${o}</button>`).join('')}</div>${S.hintsLeft>0&&!S.hintUsed?`<button class="hint-btn" onclick="useHint()">💡 Use Hint (${S.hintsLeft} left)</button>`:''}${S.hintUsed&&q.hint?`<div class="hint-box">💡 <b>Hint:</b> ${q.hint}</div>`:''}`;startTimer();}
function renderSummary(c){
  const total=S.roundCorrect+S.roundWrong;
  const acc=total>0?Math.round(S.roundCorrect/total*100):0;
  const grade=acc>=90?{icon:'🏆',label:'Outstanding!',color:'#FFD700'}:acc>=70?{icon:'⭐',label:'Great Job!',color:'#a78bfa'}:acc>=50?{icon:'👍',label:'Good Effort!',color:'#67e8f9'}:{icon:'💪',label:'Keep Practising!',color:'#fb923c'};
  const isDaily=S.diff==='daily';
  const bossBtn=isDaily?'':`<button class="diff-btn btn-easy" style="margin-bottom:8px;" onclick="sfxClick();proceedFromSummary()">⚔️ Fight the Boss!</button>`;
  const perfMsg=acc===100?'<div style="color:#4ade80;font-size:12px;margin-bottom:10px;font-weight:700;">🌟 Perfect Score! Every answer correct!</div>':acc<50?'<div style="color:#fca5a5;font-size:12px;margin-bottom:10px;">Review the passages carefully — re-read before answering!</div>':'';
  c.innerHTML=`<div class="summary-card"><div style="font-size:50px;margin-bottom:6px;">${grade.icon}</div><div class="summary-title" style="color:${grade.color}">${grade.label}</div><div class="summary-sub">${isDaily?'📅 Daily Challenge Complete!':'Round Complete — Ready for the Boss?'}</div>${perfMsg}<div class="summary-stats"><div class="summary-stat"><div class="summary-stat-val" style="color:#4ade80">${S.roundCorrect}</div><div class="summary-stat-lbl">Correct</div></div><div class="summary-stat"><div class="summary-stat-val" style="color:#f87171">${S.roundWrong}</div><div class="summary-stat-lbl">Wrong</div></div><div class="summary-stat"><div class="summary-stat-val" style="color:${acc>=70?'#4ade80':'#f87171'}">${acc}%</div><div class="summary-stat-lbl">Accuracy</div></div><div class="summary-stat"><div class="summary-stat-val" style="color:#FFD700">🔥${S.streak}</div><div class="summary-stat-lbl">Best Streak</div></div></div>${bossBtn}<button class="diff-btn btn-medium" style="margin-bottom:0;background:#4c1d95;box-shadow:0 4px 0 #2e1065;" onclick="sfxClick();S.phase='start';render()">🏠 Main Menu</button></div>`;
}
function renderResult(c){
  const win=S.phase==='win';
  const totalAns=(S.totalCorrect||0)+(S.totalWrong||0);
  const overallAcc=totalAns>0?Math.round((S.totalCorrect||0)/totalAns*100):0;
  c.innerHTML=`<div class="card result-screen">
    <span class="result-emoji">${win?'🏆':'💀'}</span>
    <div class="result-title" style="color:${win?'#FFD700':'#FF6B6B'}">${win?'Victory!':'Defeated!'}</div>
    <div class="result-msg">${win?'Amazing work, '+S.playerName+'! You defeated the Archmage! The Guild is saved! 🌟':'Don\'t give up, '+S.playerName+'! Every great wizard fails before they master their craft. 💪'}</div>
    <div class="result-xp">⚡ Total XP: ${S.xp}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;">
      <div class="summary-stat"><div class="summary-stat-val" style="color:#4ade80">${S.totalCorrect||0}</div><div class="summary-stat-lbl">All-Time Correct</div></div>
      <div class="summary-stat"><div class="summary-stat-val">${overallAcc}%</div><div class="summary-stat-lbl">All-Time Accuracy</div></div>
      <div class="summary-stat"><div class="summary-stat-val" style="color:#FFD700">🔥${S.bestStreak}</div><div class="summary-stat-lbl">Best Streak</div></div>
      <div class="summary-stat"><div class="summary-stat-val" style="color:#a78bfa">🏆${S.wins||0}</div><div class="summary-stat-lbl">Boss Wins</div></div>

    <button class="play-btn" onclick="sfxClick();resetRound()">✨ Play Again</button>
  </div>`;}

function startGame(diff){if(!musicStarted)startMusic();S.totalGames=(S.totalGames||0)+1;S.diff=diff;S.qs=pick(QBANK[diff],Math.min(5,QBANK[diff].length));S.qi=0;S.phase='question';S.busy=false;S.roundCorrect=0;S.roundWrong=0;S.hintsLeft=2;S.hintUsed=false;render();}
function useHint(){sfxHint();S.hintUsed=true;S.hintsLeft--;render();}
function goBack(){if(S.busy)return;sfxBack();stopTimer();S.phase='start';S.bossHp=100;S.phase2=false;render();}
function saveGame(){sfxSave();doSave();}
function answer(choice){
  if(S.busy)return;S.busy=true;stopTimer();
  const q=S.qs[S.qi];
  document.querySelectorAll('.option-btn').forEach(b=>b.style.pointerEvents='none');
  if(choice===q.a){
    document.getElementById('o'+choice).classList.add('correct');S.xp+=10;S.roundCorrect++;S.streak++;S.totalCorrect=(S.totalCorrect||0)+1;
    if(S.streak>S.bestStreak)S.bestStreak=S.streak;const oldLevel=S.level;let bonus=0;
    if(S.streak===3){bonus=5;toast('🔥 3 Streak! +5 bonus XP!','#f59e0b');sfxStreak();}
    else if(S.streak===5){bonus=15;toast('⚡ 5 STREAK! +15 bonus XP!','#FFD700');sfxStreak();}
    else toast('✅ Correct!','#27ae60');
    S.xp+=bonus;if(S.xp>=S.level*50)S.level++;
    correctSparks();sfxCorrect();
    if(S.phase==='boss'){S.bossHp-=25;if(S.bossHp<0)S.bossHp=0;const f=document.getElementById('hpFill');if(f)f.style.width=S.bossHp+'%';const b=document.getElementById('bossEmoji');if(b){b.classList.add('shaking');setTimeout(()=>b.classList.remove('shaking'),450);}}
    checkUnlocks();doSave();
    // Correct: auto-advance after short delay
    setTimeout(()=>{S.busy=false;if(S.phase==='boss'&&S.bossHp<=0){sfxVictory();S.wins=(S.wins||0)+1;S.phase='win';render();return;}S.qi++;S.hintUsed=false;if(S.level>oldLevel)setTimeout(()=>showLevelUp(S.level),600);advanceQ();},900);
  } else {
    document.getElementById('o'+choice).classList.add('wrong');document.getElementById('o'+q.a).classList.add('correct');
    S.hp--;S.roundWrong++;S.streak=0;S.totalWrong=(S.totalWrong||0)+1;
    wrongSparks();sfxWrong();toast('❌ Wrong!','#e74c3c');doSave();
    // Wrong: show explanation + Next button, wait for user tap
    showExplanation(false, q.ex, ()=>{
      S.busy=false;
      if(S.hp<=0){sfxDefeat();S.phase='lose';render();return;}
      S.qi++;S.hintUsed=false;advanceQ();
    });
  }
}
function advanceQ(){if(S.phase==='question'&&S.qi>=S.qs.length){
  if(S.diff==='daily'){
    const today=new Date().toISOString().slice(0,10);
    S.lastDaily=today;S.dailyDone=true;S.dailyScore=S.roundCorrect;doSave();
  }
  S.phase='summary';render();return;}if(S.phase==='boss'&&S.qi>=S.qs.length){if(!S.phase2&&S.bossHp>0){S.phase2=true;S.qs=pick(QBANK.boss2,QBANK.boss2.length);S.qi=0;sfxBoss();toast('Phase 2!','#FF4500');}else if(S.bossHp>0){S.qs=pick(QBANK.boss,QBANK.boss.length);S.qi=0;}}render();}
function proceedFromSummary(){S.bossHp=100;S.phase2=false;S.hintsLeft=2;S.hintUsed=false;S.qs=pick(QBANK.boss,QBANK.boss.length);S.qi=0;S.phase='boss';sfxBoss();render();}
function resetRound(){S.hp=3;S.xp=0;S.level=1;S.phase='start';S.bossHp=100;S.phase2=false;S.busy=false;S.streak=0;S.hintsLeft=2;S.hintUsed=false;S.roundCorrect=0;S.roundWrong=0;doSave();render();}


function getRank(){
  if(S.xp>=200)return{title:'Archmage',color:'#FFD700',bg:'rgba(255,215,0,.15)',border:'rgba(255,215,0,.4)',icon:'👑'};
  if(S.xp>=120)return{title:'Wizard',color:'#a78bfa',bg:'rgba(167,139,250,.15)',border:'rgba(167,139,250,.4)',icon:'🧙'};
  if(S.xp>=60)return{title:'Spellcaster',color:'#67e8f9',bg:'rgba(103,232,249,.15)',border:'rgba(103,232,249,.4)',icon:'🔮'};
  if(S.xp>=20)return{title:'Apprentice',color:'#86efac',bg:'rgba(134,239,172,.15)',border:'rgba(134,239,172,.4)',icon:'📖'};
  return{title:'Novice',color:'#C8B6FF',bg:'rgba(200,182,255,.1)',border:'rgba(200,182,255,.3)',icon:'✨'};
}

function getAvatarOptions(){return['🧙','🧝','🧚','🧜','🦸','🧑‍🎓','👸','🤴','🦊','🐉','⚔️','🌟'];}

function showProfile(){
  sfxClick();
  const ov=document.getElementById('levelupOverlay');
  ov.style.display='flex';
  const rank=getRank();
  const correct=S.totalCorrect||0;
  const wrong=S.totalWrong||0;
  const acc=(correct+wrong)>0?Math.round(correct/(correct+wrong)*100):0;
  const milestones=[
    {icon:'🎯',name:'First Quest',desc:'Complete your first game',done:(S.totalGames||0)>=1},
    {icon:'🔥',name:'On Fire',desc:'Reach a 3-answer streak',done:S.bestStreak>=3},
    {icon:'⚡',name:'Speed Demon',desc:'Get 5 streak in a row',done:S.bestStreak>=5},
    {icon:'🔮',name:'Spellcaster',desc:'Unlock Medium difficulty',done:S.unlockedDiffs.medium},
    {icon:'🐉',name:'Dragon Slayer',desc:'Unlock Hard difficulty',done:S.unlockedDiffs.hard},
    {icon:'🏆',name:'Guild Champion',desc:'Defeat the Archmage',done:(S.wins||0)>=1},
    {icon:'👑',name:'Archmage',desc:'Reach 200 XP',done:S.xp>=200},
  ];
  const earned=milestones.filter(function(m){return m.done;}).length;

  var mRows='';
  milestones.forEach(function(m){
    mRows+='<div class="milestone-row">'
      +'<div class="milestone-icon" style="opacity:'+(m.done?1:.3)+'">'+m.icon+'</div>'
      +'<div class="milestone-info">'
        +'<div class="milestone-name" style="color:'+(m.done?'white':'#6b7280')+'">'+m.name+'</div>'
        +'<div class="milestone-desc">'+m.desc+'</div>'
      +'</div>'
      +'<div style="font-size:16px">'+(m.done?'✅':'🔒')+'</div>'
    +'</div>';
  });

  var installBtn=deferredPrompt
    ?'<button class="edit-name-btn" onclick="closeProfile();doInstall()" style="color:#FFD700;border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.08);">⬇️ Install as App</button>'
    :'';

  ov.innerHTML=''
    +'<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:400;overflow-y:auto;padding:14px;">'
    +'<div style="background:linear-gradient(160deg,#1a1040,#2d1b69);border:1.5px solid rgba(167,139,250,.3);border-radius:20px;padding:20px 16px;">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">'
    +'<div style="font-family:Fredoka One,cursive;font-size:18px;color:#FFD700;">My Profile</div>'
    +'<button onclick="closeProfile()" style="background:rgba(255,255,255,.1);border:none;border-radius:50%;width:30px;height:30px;color:white;font-size:16px;cursor:pointer;">✕</button>'
    +'</div>'
    +'<div class="avatar-ring" id="avatarRing" onclick="cycleAvatar()">'
    +'<div class="avatar-inner" id="avatarInner">'+(S.avatar||'🧙')+'</div>'
    +'</div>'
    +'<div style="font-size:10px;color:#6b7280;text-align:center;margin-bottom:10px;">tap avatar to change</div>'
    +'<div class="profile-name">'+S.playerName+'</div>'
    +'<div class="rank-badge" style="background:'+rank.bg+';border:1.5px solid '+rank.border+';color:'+rank.color+';">'+rank.icon+' '+rank.title+'</div>'
    +'<div class="stats-grid">'
    +'<div class="stat-box"><div class="stat-val">⚡'+S.xp+'</div><div class="stat-lbl">Total XP</div></div>'
    +'<div class="stat-box"><div class="stat-val">⭐'+S.level+'</div><div class="stat-lbl">Level</div></div>'
    +'<div class="stat-box"><div class="stat-val">🔥'+S.bestStreak+'</div><div class="stat-lbl">Best Streak</div></div>'
    +'<div class="stat-box"><div class="stat-val">'+acc+'%</div><div class="stat-lbl">Accuracy</div></div>'
    +'<div class="stat-box"><div class="stat-val">🎮'+(S.totalGames||0)+'</div><div class="stat-lbl">Games Played</div></div>'
    +'<div class="stat-box"><div class="stat-val">🏆'+(S.wins||0)+'</div><div class="stat-lbl">Boss Wins</div></div>'
    +'</div>'
    +'<div style="font-family:Fredoka One,cursive;font-size:14px;color:#a78bfa;margin-bottom:8px;">Achievements '+earned+'/'+milestones.length+'</div>'
    +'<div class="milestones">'+mRows+'</div>'
    +'<button class="edit-name-btn" onclick="editName()">✏️ Change Name</button>'
    +installBtn
    +'<button class="danger-btn" onclick="confirmReset()">🗑️ Reset All Progress</button>'
    +'</div></div>';
}

function closeProfile(){sfxClick();document.getElementById('levelupOverlay').style.display='none';document.getElementById('levelupOverlay').innerHTML='';}

let avatarIdx=-1;
function cycleAvatar(){
  sfxClick();
  const opts=getAvatarOptions();
  if(avatarIdx<0)avatarIdx=opts.indexOf(S.avatar||'🧙');
  avatarIdx=(avatarIdx+1)%opts.length;
  S.avatar=opts[avatarIdx];
  const el=document.getElementById('avatarInner');
  if(el)el.textContent=S.avatar;
  document.getElementById('profileBtn').textContent=S.avatar;
  doSave();
}

function editName(){
  sfxClick();
  closeProfile();
  S.phase='name';
  render();
}

function confirmReset(){
  sfxClick();
  const ov=document.getElementById('levelupOverlay');
  ov.innerHTML=''
    +'<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;">'
    +'<div style="background:#1a0820;border:2px solid #ef4444;border-radius:20px;padding:24px;text-align:center;max-width:300px;">'
    +'<div style="font-size:50px;margin-bottom:12px;">⚠️</div>'
    +'<div style="font-family:Fredoka One,cursive;font-size:20px;color:#f87171;margin-bottom:8px;">Reset Everything?</div>'
    +'<div style="font-family:Nunito,sans-serif;font-size:13px;color:#C8B6FF;margin-bottom:20px;line-height:1.5;">This will delete all your XP, levels, streaks and achievements. This cannot be undone!</div>'
    +'<div style="display:flex;gap:10px;">'
    +'<button onclick="doReset()" style="flex:1;font-family:Fredoka One,cursive;font-size:15px;padding:12px;border:none;border-radius:12px;background:#dc2626;color:white;cursor:pointer;">Yes, Reset</button>'
    +'<button onclick="closeProfile()" style="flex:1;font-family:Fredoka One,cursive;font-size:15px;padding:12px;border:1.5px solid rgba(255,255,255,.2);border-radius:12px;background:transparent;color:#C8B6FF;cursor:pointer;">Cancel</button>'
    +'</div></div></div>';
}

function doReset(){
  sfxClick();
  try{localStorage.removeItem('mgt_v11');}catch(e){}
  S={playerName:'',phase:'name',hp:3,xp:0,level:1,diff:null,qs:[],qi:0,bossHp:100,phase2:false,busy:false,streak:0,bestStreak:0,hintsLeft:2,hintUsed:false,timer:0,timerMax:0,timerInterval:null,roundCorrect:0,roundWrong:0,unlockedDiffs:{easy:true,medium:false,hard:false},xpForDiffs:{medium:30,hard:80},totalGames:0,totalCorrect:0,totalWrong:0,wins:0,avatar:'🧙'};
  closeProfile();
  render();
}

window.startGame=startGame;window.startDaily=startDaily;window.answer=answer;window.resetRound=resetRound;window.goBack=goBack;window.saveGame=saveGame;window.toggleMusic=toggleMusic;window.sfxClick=sfxClick;window.confirmName=confirmName;window.useHint=useHint;window.dismissLevelUp=dismissLevelUp;window.proceedFromSummary=proceedFromSummary;window.doInstall=doInstall;window.dismissInstall=dismissInstall;window.showProfile=showProfile;window.closeProfile=closeProfile;window.cycleAvatar=cycleAvatar;window.editName=editName;window.confirmReset=confirmReset;window.doReset=doReset;
render();
</script>
</body>
</html>
