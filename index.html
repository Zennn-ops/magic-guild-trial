<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Magic Guild Trial — A fun reading comprehension quest game for kids!">
<meta name="theme-color" content="#1a1040">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Guild Trial">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<!-- Fonts (online) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<title>Magic Guild Trial</title>
<style>
/* Offline fallback fonts — used when Google Fonts unavailable */
@font-face{font-family:'Fredoka One';font-style:normal;font-weight:400;src:local('Fredoka One'),local('FredokaOne-Regular');}
@font-face{font-family:'Nunito';font-style:normal;font-weight:400;src:local('Nunito'),local('Nunito-Regular');}
@font-face{font-family:'Nunito';font-style:normal;font-weight:700;src:local('Nunito Bold'),local('Nunito-Bold');}

/* ── OFFLINE BANNER ── */
#offlineBanner{position:fixed;top:0;left:0;width:100%;z-index:9999;background:#b45309;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;text-align:center;padding:8px 16px;display:none;letter-spacing:.5px;}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#111827;overflow:hidden;}

/* ── PHONE FRAME (desktop) ── */
.phone-wrap{display:flex;justify-content:center;align-items:flex-start;padding:24px 16px;min-height:100vh;background:#111827;}
.phone{width:375px;height:780px;background:#0f0c29;border-radius:44px;border:10px solid #1f2937;box-shadow:0 0 0 2px #374151,0 30px 80px rgba(0,0,0,.8),inset 0 0 0 1px rgba(255,255,255,.05);overflow:hidden;position:relative;display:flex;flex-direction:column;}
.notch{width:120px;height:28px;background:#1f2937;border-radius:0 0 18px 18px;margin:0 auto;z-index:10;flex-shrink:0;}

/* ── FULL SCREEN on real phones ── */
@media(max-width:430px){
  body{overflow:hidden;}
  .phone-wrap{padding:0;min-height:100dvh;align-items:stretch;}
  .phone{width:100%;height:100dvh;border-radius:0;border:none;box-shadow:none;}
  .notch,.home-bar{display:none;}
}

.screen{flex:1;overflow-y:auto;overflow-x:hidden;background:linear-gradient(160deg,#1a1040 0%,#2d1b69 55%,#0f4c3a 100%);position:relative;scrollbar-width:none;}
.screen::-webkit-scrollbar{display:none;}
.home-bar{height:20px;background:#1f2937;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.home-indicator{width:100px;height:4px;background:#4b5563;border-radius:4px;}
.stars-bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 2s infinite alternate;}

@keyframes twinkle{from{opacity:.1}to{opacity:.9}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes popIn{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes glowPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.2)}}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(-18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes bossShake{0%,100%{transform:scale(1.1)}25%{transform:translateX(-10px) scale(1.1)}75%{transform:translateX(10px) scale(1.1)}}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0) rotate(var(--pr))}}
@keyframes levelUp{0%{transform:scale(0) rotate(-10deg);opacity:0}50%{transform:scale(1.2) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes streakBounce{0%,100%{transform:scale(1)}40%{transform:scale(1.3)}70%{transform:scale(.9)}}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes lockWiggle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes nameSlide{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes installPop{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}

.content{position:relative;z-index:1;padding:14px 14px 80px;}
.title{font-family:'Fredoka One',cursive;font-size:24px;color:#FFD700;text-shadow:0 0 16px #FFD70066,2px 2px 0 #6B3A00;text-align:center;margin-bottom:2px;animation:pulse 3s ease-in-out infinite;}
.title-sub{font-family:'Nunito',sans-serif;font-size:11px;color:#a78bfa;text-align:center;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;opacity:.85;}
.card{background:rgba(255,255,255,.07);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,.13);border-radius:20px;padding:16px 14px;margin-bottom:12px;animation:slideUp .35s ease;font-family:'Nunito',sans-serif;}
.hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:5px;}
.hud-stat{background:rgba(255,255,255,.11);border-radius:40px;padding:5px 11px;color:white;font-weight:700;font-size:12px;display:flex;align-items:center;gap:4px;font-family:'Nunito',sans-serif;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;}
.icon-btn{font-family:'Fredoka One',cursive;font-size:13px;padding:8px 14px;border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:transform .15s;white-space:nowrap;color:#fff;text-shadow:1px 1px 2px rgba(0,0,0,.5);}
.icon-btn:active{transform:scale(.92) translateY(1px);}
.back-btn{background:#7c3aed;box-shadow:0 4px 0 #4c1d95,0 0 14px #7c3aedaa;animation:glowPulse 2.5s ease-in-out infinite;}
.save-btn{background:#d97706;box-shadow:0 4px 0 #92400e,0 0 14px #f59e0baa;animation:glowPulse 2.5s ease-in-out infinite;}
.music-btn{position:absolute;bottom:28px;right:16px;z-index:300;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:transform .15s;box-shadow:0 0 12px rgba(168,139,250,.5);}
.music-btn:active{transform:scale(.88);}
.diff-btn{width:100%;font-family:'Fredoka One',cursive;font-size:17px;border:none;border-radius:16px;padding:14px 16px;margin-bottom:10px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;gap:10px;text-shadow:0 1px 3px rgba(0,0,0,.5);transition:transform .15s;position:relative;overflow:hidden;}
.diff-btn:active{transform:translateY(2px);}
.btn-easy{background:#16a34a;box-shadow:0 4px 0 #14532d,0 0 16px #22c55eaa;animation:glowPulse 2s ease-in-out infinite;}
.btn-medium{background:#ea580c;box-shadow:0 4px 0 #7c2d12,0 0 16px #fb923caa;animation:glowPulse 2.2s ease-in-out infinite;}
.btn-hard{background:#dc2626;box-shadow:0 4px 0 #7f1d1d,0 0 16px #f87171aa;animation:glowPulse 1.8s ease-in-out infinite;}
.locked-btn{background:#374151!important;box-shadow:0 4px 0 #1f2937!important;animation:none!important;cursor:not-allowed;opacity:.7;}
.lock-badge{position:absolute;right:14px;font-size:18px;animation:lockWiggle 2s ease-in-out infinite;}
.passage-box{background:rgba(255,255,255,.06);border-left:3px solid #FFD700;border-radius:0 12px 12px 0;padding:11px 13px;margin-bottom:12px;color:#E8D5FF;font-size:13px;line-height:1.65;font-family:'Nunito',sans-serif;}
.question-text{color:#FFD700;font-family:'Fredoka One',cursive;font-size:16px;text-align:center;margin-bottom:12px;text-shadow:0 0 10px #FFD70044;}
.option-btn{width:100%;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;padding:12px 13px;margin-bottom:8px;border:none;border-radius:14px;color:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:transform .15s;text-shadow:0 1px 2px rgba(0,0,0,.4);}
.option-btn:active{transform:scale(.97);}
.opt-a{background:#1d4ed8;box-shadow:0 3px 0 #1e3a8a,0 0 12px #60a5faaa;animation:glowPulse 2.4s ease-in-out infinite;}
.opt-b{background:#15803d;box-shadow:0 3px 0 #14532d,0 0 12px #4ade80aa;animation:glowPulse 2.1s ease-in-out infinite;}
.opt-c{background:#7e22ce;box-shadow:0 3px 0 #4c1d95,0 0 12px #c084fcaa;animation:glowPulse 2.6s ease-in-out infinite;}
.opt-d{background:#b91c1c;box-shadow:0 3px 0 #7f1d1d,0 0 12px #f87171aa;animation:glowPulse 2.3s ease-in-out infinite;}
.option-btn.correct{background:#065f46!important;box-shadow:0 0 24px #10b981,0 0 55px #10b98177!important;animation:popIn .3s ease!important;}
.option-btn.wrong{background:#7f1d1d!important;box-shadow:0 0 20px #ef4444!important;animation:shake .4s ease!important;}
.option-letter{background:rgba(255,255,255,.2);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.prog-wrap{margin-bottom:12px;}
.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.prog-meta span{color:#C8B6FF;font-size:11px;font-family:'Nunito',sans-serif;}
.prog-meta b{color:#FFD700;font-size:11px;font-family:'Nunito',sans-serif;}
.prog-bg{background:rgba(255,255,255,.08);border-radius:20px;height:7px;overflow:hidden;}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#6c63ff,#FFD700);transition:width .4s ease;box-shadow:0 0 6px #FFD70066;}
.streak-bar{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:10px;}
.streak-dot{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.2);transition:all .3s;}
.streak-dot.lit{background:#FFD700;border-color:#FFD700;box-shadow:0 0 8px #FFD700,0 0 20px #FFD70066;animation:streakBounce .4s ease;}
.streak-label{color:#C8B6FF;font-size:11px;font-family:'Nunito',sans-serif;margin-right:4px;}
.timer-ring{text-align:center;margin-bottom:8px;}
.timer-num{font-family:'Fredoka One',cursive;font-size:22px;color:white;}
.timer-num.danger{color:#f87171;animation:timerPulse .5s ease-in-out infinite;}
.timer-track{background:rgba(255,255,255,.1);border-radius:20px;height:6px;overflow:hidden;margin-bottom:10px;}
.hint-btn{background:rgba(255,215,0,.15);border:1.5px solid rgba(255,215,0,.4);border-radius:12px;color:#FFD700;font-family:'Fredoka One',cursive;font-size:13px;padding:7px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:transform .15s;width:100%;justify-content:center;margin-bottom:10px;}
.hint-btn:active{transform:scale(.95);}
.hint-box{background:rgba(255,215,0,.08);border:1.5px solid rgba(255,215,0,.3);border-radius:14px;padding:10px 14px;color:#FFF9C4;font-size:13px;font-family:'Nunito',sans-serif;margin-bottom:10px;animation:slideDown .3s ease;line-height:1.5;}
.boss-area{text-align:center;margin-bottom:12px;}
.boss-emoji{font-size:52px;display:inline-block;filter:drop-shadow(0 0 18px rgba(255,80,80,.9));animation:pulse 1.5s ease-in-out infinite;}
.boss-emoji.shaking{animation:bossShake .4s ease;}
.boss-name{font-family:'Fredoka One',cursive;font-size:18px;color:#FF6B6B;text-shadow:0 0 12px #FF6B6B88;}
.hp-label{color:#FFA07A;font-size:11px;font-weight:700;margin:5px 0 3px;font-family:'Nunito',sans-serif;}
.hp-bg{background:rgba(255,255,255,.1);border-radius:20px;height:14px;overflow:hidden;}
.hp-fill{height:100%;border-radius:20px;transition:width .5s ease;background:linear-gradient(90deg,#e74c3c,#ff6b6b);box-shadow:0 0 10px #ef444466;}
.phase-banner{background:linear-gradient(135deg,#FF4500,#FF6B6B);border-radius:14px;padding:9px 14px;text-align:center;color:white;font-family:'Fredoka One',cursive;font-size:16px;margin-bottom:10px;animation:popIn .4s ease;box-shadow:0 0 28px rgba(255,100,0,.5);}
.summary-card{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.13);border-radius:20px;padding:20px 16px;margin-bottom:12px;text-align:center;animation:popIn .5s ease;font-family:'Nunito',sans-serif;}
.summary-title{font-family:'Fredoka One',cursive;font-size:22px;color:#FFD700;margin-bottom:4px;}
.summary-sub{color:#C8B6FF;font-size:12px;margin-bottom:16px;}
.summary-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.summary-stat{background:rgba(255,255,255,.08);border-radius:14px;padding:10px;}
.summary-stat-val{font-family:'Fredoka One',cursive;font-size:24px;color:#FFD700;}
.summary-stat-lbl{font-size:11px;color:#C8B6FF;}
.levelup-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:400;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease;}
.levelup-box{background:linear-gradient(135deg,#4c1d95,#1e3a8a);border:2px solid #FFD700;border-radius:24px;padding:28px 24px;text-align:center;animation:levelUp .5s ease;box-shadow:0 0 40px #FFD70088;margin:16px;}
.levelup-emoji{font-size:60px;display:block;margin-bottom:8px;}
.levelup-title{font-family:'Fredoka One',cursive;font-size:28px;color:#FFD700;text-shadow:0 0 20px #FFD700;margin-bottom:4px;}
.levelup-sub{color:#C8B6FF;font-size:14px;margin-bottom:18px;font-family:'Nunito',sans-serif;}
.levelup-ok{font-family:'Fredoka One',cursive;font-size:17px;padding:12px 32px;border:none;border-radius:50px;background:#FFD700;color:#1a1040;cursor:pointer;box-shadow:0 4px 0 #b45309;}
.name-input{width:100%;font-family:'Fredoka One',cursive;font-size:18px;padding:14px 16px;border-radius:16px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:white;text-align:center;outline:none;margin-bottom:14px;}
.name-input::placeholder{color:rgba(255,255,255,.4);}
.name-input:focus{border-color:#FFD700;box-shadow:0 0 12px #FFD70055;}
.name-greet{font-family:'Fredoka One',cursive;font-size:15px;color:#C8B6FF;text-align:center;margin-bottom:14px;animation:nameSlide .4s ease;}
.result-screen{text-align:center;padding:12px 0;}
.result-emoji{font-size:64px;display:block;margin-bottom:10px;}
.result-title{font-family:'Fredoka One',cursive;font-size:28px;margin-bottom:6px;}
.result-msg{color:#C8B6FF;font-size:13px;margin-bottom:14px;line-height:1.6;font-family:'Nunito',sans-serif;}
.result-xp{background:rgba(255,215,0,.12);border:1.5px solid #FFD700;border-radius:14px;padding:9px 18px;display:inline-block;color:#FFD700;font-weight:700;font-size:15px;margin-bottom:16px;font-family:'Nunito',sans-serif;box-shadow:0 0 12px #FFD70055;}
.play-btn{font-family:'Fredoka One',cursive;font-size:17px;padding:13px 34px;border:none;border-radius:50px;background:#6c63ff;color:white;cursor:pointer;box-shadow:0 5px 0 #4730c4,0 0 18px #6c63ffaa;animation:glowPulse 2s ease-in-out infinite;}
.play-btn:active{transform:translateY(2px);}
.best-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);border-radius:20px;padding:3px 10px;font-size:11px;color:#FFD700;font-family:'Nunito',sans-serif;font-weight:700;margin-left:6px;}
.fx-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;overflow:hidden;}
.spark{position:absolute;pointer-events:none;border-radius:50%;}
.screen-flash{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99;border-radius:34px;}
.feedback-toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:white;border-radius:20px;padding:12px 24px;text-align:center;font-family:'Fredoka One',cursive;font-size:20px;z-index:200;transition:transform .18s;box-shadow:0 10px 40px rgba(0,0,0,.5);pointer-events:none;white-space:nowrap;}
.feedback-toast.show{transform:translate(-50%,-50%) scale(1);}
.save-indicator{position:absolute;top:35px;right:14px;background:rgba(255,215,0,.9);color:#6B3A00;font-family:'Fredoka One',cursive;font-size:12px;padding:5px 12px;border-radius:20px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;}
.save-indicator.show{opacity:1;}
.diff-badge{display:inline-block;font-family:'Fredoka One',cursive;font-size:11px;padding:3px 10px;border-radius:20px;}
.badge-easy{background:rgba(22,163,74,.25);color:#86efac;}
.badge-medium{background:rgba(234,88,12,.25);color:#fdba74;}
.badge-hard{background:rgba(220,38,38,.25);color:#fca5a5;}

/* ── INSTALL PROMPT ── */
#installPrompt{position:absolute;bottom:72px;left:12px;right:12px;background:linear-gradient(135deg,#4c1d95,#1e3a8a);border:1.5px solid #FFD700;border-radius:18px;padding:14px 16px;z-index:500;display:none;animation:installPop .4s ease;box-shadow:0 0 30px rgba(255,215,0,.3);}
#installPrompt p{color:#E8D5FF;font-family:'Nunito',sans-serif;font-size:13px;margin-bottom:10px;line-height:1.5;}
#installPrompt .install-btns{display:flex;gap:8px;}
#installPrompt .btn-install{flex:1;font-family:'Fredoka One',cursive;font-size:14px;padding:10px;border:none;border-radius:12px;background:#FFD700;color:#1a1040;cursor:pointer;}
#installPrompt .btn-dismiss{flex:1;font-family:'Fredoka One',cursive;font-size:14px;padding:10px;border:1.5px solid rgba(255,255,255,.2);border-radius:12px;background:transparent;color:#C8B6FF;cursor:pointer;}
</style>

<body>
<div id="offlineBanner">⚠️ You are offline — game still works! Progress is saved locally.</div>

<div class="phone-wrap"><div class="phone">
  <div class="notch"></div>
  <div class="screen" id="screen">
    <div class="stars-bg" id="starsBg"></div>
    <div class="fx-layer" id="fxLayer"></div>
    <div class="screen-flash" id="screenFlash"></div>
    <div class="feedback-toast" id="toast"></div>
    <div class="save-indicator" id="saveInd">💾 Saved!</div>
    <div id="levelupOverlay" style="display:none"></div>
    <div id="installPrompt">
      <p>📱 <b>Install Magic Guild Trial</b> on your home screen to play anytime — even without internet!</p>
      <div class="install-btns">
        <button class="btn-install" onclick="doInstall()">Install App</button>
        <button class="btn-dismiss" onclick="dismissInstall()">Not now</button>
      </div>
    </div>
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>
    <div class="content" id="content"></div>
  </div>
  <div class="home-bar"><div class="home-indicator"></div></div>
</div></div>

<script>
// ═══ SERVICE WORKER ═══
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.log('SW failed:', e));
  });
}

// ═══ OFFLINE DETECTION ═══
function updateOnlineStatus() {
  document.getElementById('offlineBanner').style.display = navigator.onLine ? 'none' : 'block';
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ═══ INSTALL PROMPT (PWA) ═══
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install prompt after player enters name (not immediately)
  setTimeout(() => {
    if (deferredPrompt && S.phase === 'start') {
      document.getElementById('installPrompt').style.display = 'block';
    }
  }, 3000);
});
function doInstall() {
  dismissInstall();
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
}
function dismissInstall() {
  document.getElementById('installPrompt').style.display = 'none';
}
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  dismissInstall();
  toast('🎉 App installed!', '#22c55e');
});

// ═══ AUDIO ═══
let AC=null,musicPlaying=false,musicInterval=null,musicStarted=false,musicGain=null,melIdx=0,bassIdx=0,chordIdx=0;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function playTone(f,t,d,v,delay=0){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=t;o.frequency.setValueAtTime(f,ac.currentTime+delay);g.gain.setValueAtTime(0,ac.currentTime+delay);g.gain.linearRampToValueAtTime(v,ac.currentTime+delay+.01);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+delay+d);o.start(ac.currentTime+delay);o.stop(ac.currentTime+delay+d+.05);}catch(e){}}
function playNoise(d,v,delay=0){try{const ac=getAC(),buf=ac.createBuffer(1,ac.sampleRate*d,ac.sampleRate),data=buf.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;const s=ac.createBufferSource(),g=ac.createGain(),flt=ac.createBiquadFilter();flt.type='bandpass';flt.frequency.value=800;s.buffer=buf;s.connect(flt);flt.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(v,ac.currentTime+delay);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+delay+d);s.start(ac.currentTime+delay);s.stop(ac.currentTime+delay+d+.05);}catch(e){}}

const MELODY=[[392,.4],[440,.2],[494,.2],[523,.4],[494,.2],[440,.4],[392,.4],[349,.2],[392,.2],[440,.6],[523,.4],[587,.2],[659,.2],[698,.4],[659,.2],[587,.4],[523,.4],[494,.2],[440,.2],[392,.8]];
const BASS=[196,196,220,220,175,175,196,196,220,220,246,246,262,262,220,220];
const CHORD_FREQS=[[261,329,392],[220,277,330],[196,247,294],[246,311,370]];
function startMusic(){if(musicStarted)return;musicStarted=true;musicPlaying=true;document.getElementById('musicBtn').textContent='🎵';mloop();}
function mloop(){if(!musicPlaying)return;try{const ac=getAC();if(!musicGain){musicGain=ac.createGain();musicGain.gain.value=.06;musicGain.connect(ac.destination);}const now=ac.currentTime,[mf,md]=MELODY[melIdx%MELODY.length];const mo=ac.createOscillator(),mg=ac.createGain();mo.connect(mg);mg.connect(musicGain);mo.type='triangle';mo.frequency.value=mf;mg.gain.setValueAtTime(.7,now);mg.gain.linearRampToValueAtTime(0,now+md);mo.start(now);mo.stop(now+md);melIdx++;if(melIdx%2===0){const bo=ac.createOscillator(),bg=ac.createGain();bo.connect(bg);bg.connect(musicGain);bo.type='sine';bo.frequency.value=BASS[bassIdx%BASS.length];bg.gain.setValueAtTime(.4,now);bg.gain.exponentialRampToValueAtTime(.001,now+.5);bo.start(now);bo.stop(now+.6);bassIdx++;}if(melIdx%8===0){CHORD_FREQS[chordIdx%CHORD_FREQS.length].forEach(cf=>{const co=ac.createOscillator(),cg=ac.createGain();co.connect(cg);cg.connect(musicGain);co.type='sine';co.frequency.value=cf;cg.gain.setValueAtTime(0,now);cg.gain.linearRampToValueAtTime(.15,now+.3);cg.gain.linearRampToValueAtTime(0,now+2);co.start(now);co.stop(now+2.1);});chordIdx++;}if(melIdx%4===0){[1047,1175,1319,1568].forEach((sf,si)=>{const so=ac.createOscillator(),sg=ac.createGain();so.connect(sg);sg.connect(musicGain);so.type='sine';so.frequency.value=sf;const sd=.05+si*.03;sg.gain.setValueAtTime(0,now+sd);sg.gain.linearRampToValueAtTime(.08,now+sd+.04);sg.gain.exponentialRampToValueAtTime(.001,now+sd+.15);so.start(now+sd);so.stop(now+sd+.2);});}musicInterval=setTimeout(mloop,md*1000);}catch(e){}}
function stopMusic(){musicPlaying=false;clearTimeout(musicInterval);if(musicGain){try{musicGain.gain.linearRampToValueAtTime(0,getAC().currentTime+.3);}catch(e){}setTimeout(()=>{musicGain=null;musicStarted=false;},400);}}
function toggleMusic(){sfxClick();if(musicPlaying){stopMusic();document.getElementById('musicBtn').textContent='🔇';}else{musicStarted=false;startMusic();document.getElementById('musicBtn').textContent='🎵';}}

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function pick(pool,n){return shuffle(pool).slice(0,n);}

function getTimerMax(diff){return{easy:0,medium:30,hard:20,boss:25}[diff]||0;}
function startTimer(){clearInterval(S.timerInterval);S.timerMax=getTimerMax(S.phase==='boss'?'boss':S.diff);if(!S.timerMax)return;S.timer=S.timerMax;S.timerInterval=setInterval(()=>{S.timer--;const fill=document.getElementById('timerFill'),num=document.getElementById('timerNum');if(fill)fill.style.width=(S.timer/S.timerMax*100)+'%';if(fill)fill.style.background=S.timer<=5?'#ef4444':S.timer<=10?'#f59e0b':'#a78bfa';if(num){num.textContent=S.timer;num.className='timer-num'+(S.timer<=5?' danger':'');}if(S.timer<=0){clearInterval(S.timerInterval);timeUp();}},1000);}
function stopTimer(){clearInterval(S.timerInterval);}
function timeUp(){if(S.busy)return;S.busy=true;document.querySelectorAll('.option-btn').forEach(b=>b.style.pointerEvents='none');const q=S.qs[S.qi];document.getElementById('o'+q.a)?.classList.add('correct');S.hp--;S.streak=0;wrongSparks();sfxWrong();toast('⏰ Time Up!','#f59e0b');doSave();setTimeout(()=>{S.busy=false;if(S.hp<=0){sfxDefeat();S.phase='lose';render();return;}S.qi++;advanceQ();},900);}

function render(){stopTimer();const c=document.getElementById('content');c.innerHTML='';if(S.phase==='name')renderName(c);else if(S.phase==='start')renderStart(c);else if(S.phase==='question')renderQ(c);else if(S.phase==='boss')renderBoss(c);else if(S.phase==='summary')renderSummary(c);else if(S.phase==='win'||S.phase==='lose')renderResult(c);document.getElementById('screen').scrollTop=0;}

function renderName(c){c.innerHTML=`<div class="title">✨ Magic Guild Trial ✨</div><div class="title-sub">A reading comprehension quest</div><div class="card"><div style="font-size:40px;text-align:center;margin-bottom:12px;">🧙‍♂️</div><div style="color:#C8B6FF;text-align:center;font-size:13px;margin-bottom:14px;font-family:'Nunito',sans-serif;">Welcome, brave hero! What is your name?</div><input class="name-input" id="nameInput" placeholder="Enter your name..." maxlength="16" value="${S.playerName}" onkeydown="if(event.key==='Enter')confirmName()"><button class="diff-btn btn-easy" style="margin-top:4px;" onclick="confirmName()">⚔️ Begin Quest!</button></div>`;setTimeout(()=>document.getElementById('nameInput')?.focus(),100);}
function confirmName(){sfxClick();const val=document.getElementById('nameInput')?.value.trim();if(!val){toast('Enter your name!','#f59e0b');return;}S.playerName=val;S.phase='start';if(!musicStarted)startMusic();doSave();render();setTimeout(()=>{if(deferredPrompt)document.getElementById('installPrompt').style.display='block';},2000);}
function renderStart(c){checkUnlocks();c.innerHTML=`<div class="title">✨ Magic Guild Trial ✨</div><div class="title-sub">A reading comprehension quest</div><div class="name-greet">Welcome back, ${S.playerName}! 🌟</div><div class="card"><div class="hud" style="justify-content:center;gap:10px;"><div class="hud-stat">${xpStat()} XP</div><div class="hud-stat">${hearts()}</div><div class="hud-stat">⭐ Lv.${S.level}</div></div><div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;"><div style="color:#C8B6FF;font-size:12px;font-family:'Nunito',sans-serif;">Best Streak:</div><div class="best-badge">🔥 ${S.bestStreak}</div></div><div style="color:#C8B6FF;text-align:center;font-size:12px;margin-bottom:14px;font-family:'Nunito',sans-serif;">Choose your challenge:</div><button class="diff-btn btn-easy" onclick="sfxClick();startGame('easy')">🌱 Easy — Beginner Quests</button><button class="diff-btn btn-medium ${S.unlockedDiffs.medium?'':'locked-btn'}" onclick="${S.unlockedDiffs.medium?'sfxClick();startGame(\'medium\')':'sfxClick();toast(\'Reach '+S.xpForDiffs.medium+' XP to unlock!\',\'#f59e0b\')'}">🔮 Medium — Enchanted Riddles${!S.unlockedDiffs.medium?'<span class="lock-badge">🔒</span>':''}</button><button class="diff-btn btn-hard ${S.unlockedDiffs.hard?'':'locked-btn'}" onclick="${S.unlockedDiffs.hard?'sfxClick();startGame(\'hard\')':'sfxClick();toast(\'Reach '+S.xpForDiffs.hard+' XP to unlock!\',\'#f59e0b\')'}">🐉 Hard — Ancient Trials${!S.unlockedDiffs.hard?'<span class="lock-badge">🔒</span>':''}</button></div><div style="color:rgba(255,255,255,.2);text-align:center;font-size:10px;font-family:'Nunito',sans-serif;">Medium unlocks at ${S.xpForDiffs.medium} XP · Hard unlocks at ${S.xpForDiffs.hard} XP</div>`;}

const OPT_CLASS=['opt-a','opt-b','opt-c','opt-d'];
function renderQ(c){const q=S.qs[S.qi],pct=(S.qi/S.qs.length)*100,L=['A','B','C','D'];const badgeClass={'easy':'badge-easy','medium':'badge-medium','hard':'badge-hard'}[S.diff]||'badge-easy';const hasTimer=getTimerMax(S.diff)>0;c.innerHTML=`${topBar('goBack()')}<div class="prog-wrap"><div class="prog-meta"><span>Q${S.qi+1}/${S.qs.length}</span><b class="diff-badge ${badgeClass}">${S.diff.toUpperCase()}</b></div><div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div></div>${streakBar()}${hasTimer?timerBlock():''}<div class="card"><div style="font-size:32px;text-align:center;margin-bottom:8px;">${q.e||'📜'}</div><div class="passage-box">${q.p}</div><div class="question-text">${q.q}</div>${q.o.map((o,i)=>`<button class="option-btn ${OPT_CLASS[i]}" id="o${i}" onclick="sfxClick();answer(${i})"><span class="option-letter">${L[i]}</span>${o}</button>`).join('')}</div>${S.hintsLeft>0&&!S.hintUsed?`<button class="hint-btn" onclick="useHint()">💡 Use Hint (${S.hintsLeft} left)</button>`:''}${S.hintUsed&&q.hint?`<div class="hint-box">💡 <b>Hint:</b> ${q.hint}</div>`:''}`;if(hasTimer)startTimer();}
function renderBoss(c){const q=S.qs[S.qi],L=['A','B','C','D'];c.innerHTML=`${topBar('goBack()')}<div class="boss-area"><div class="boss-emoji" id="bossEmoji">🧙‍♂️</div><div class="boss-name">⚡ The Archmage ⚡</div><div class="hp-label">Boss HP: ${S.bossHp}/100</div><div class="hp-bg"><div class="hp-fill" id="hpFill" style="width:${S.bossHp}%"></div></div></div>${streakBar()}${timerBlock()}${S.phase2?'<div class="phase-banner">🔥 PHASE 2 — FINAL CHALLENGE! 🔥</div>':''}<div class="card"><div style="font-size:28px;text-align:center;margin-bottom:8px;">${q.e||'🧙'}</div><div class="passage-box">${q.p}</div><div class="question-text">${q.q}</div>${q.o.map((o,i)=>`<button class="option-btn ${OPT_CLASS[i]}" id="o${i}" onclick="sfxClick();answer(${i})"><span class="option-letter">${L[i]}</span>${o}</button>`).join('')}</div>${S.hintsLeft>0&&!S.hintUsed?`<button class="hint-btn" onclick="useHint()">💡 Use Hint (${S.hintsLeft} left)</button>`:''}${S.hintUsed&&q.hint?`<div class="hint-box">💡 <b>Hint:</b> ${q.hint}</div>`:''}`;startTimer();}
function renderSummary(c){const acc=S.roundCorrect+S.roundWrong>0?Math.round(S.roundCorrect/(S.roundCorrect+S.roundWrong)*100):0;const grade=acc>=90?'🏆 Outstanding!':acc>=70?'⭐ Great job!':acc>=50?'👍 Keep it up!':'💪 Keep practising!';c.innerHTML=`<div class="summary-card"><div style="font-size:44px;margin-bottom:8px;">${acc>=80?'🎉':'📊'}</div><div class="summary-title">Round Complete!</div><div class="summary-sub">${grade}</div><div class="summary-stats"><div class="summary-stat"><div class="summary-stat-val" style="color:#4ade80">${S.roundCorrect}</div><div class="summary-stat-lbl">Correct</div></div><div class="summary-stat"><div class="summary-stat-val" style="color:#f87171">${S.roundWrong}</div><div class="summary-stat-lbl">Wrong</div></div><div class="summary-stat"><div class="summary-stat-val">${acc}%</div><div class="summary-stat-lbl">Accuracy</div></div><div class="summary-stat"><div class="summary-stat-val" style="color:#FFD700">🔥${S.streak}</div><div class="summary-stat-lbl">Streak</div></div></div><button class="diff-btn btn-easy" style="margin-bottom:8px;" onclick="sfxClick();proceedFromSummary()">⚔️ Fight the Boss!</button><button class="diff-btn btn-medium" style="margin-bottom:0;background:#4c1d95;box-shadow:0 4px 0 #2e1065;" onclick="sfxClick();S.phase='start';render()">🏠 Main Menu</button></div>`;}
function renderResult(c){const win=S.phase==='win';c.innerHTML=`<div class="card result-screen"><span class="result-emoji">${win?'🏆':'💀'}</span><div class="result-title" style="color:${win?'#FFD700':'#FF6B6B'}">${win?'Victory!':'Defeated!'}</div><div class="result-msg">${win?`Amazing, ${S.playerName}! You defeated the Archmage! 🌟`:`Don't give up, ${S.playerName}! Every great wizard fails first. 💪`}</div><div class="result-xp">⚡ Total XP: ${S.xp}</div><div style="color:#C8B6FF;font-size:12px;margin-bottom:16px;font-family:'Nunito',sans-serif;">Best Streak: 🔥${S.bestStreak}</div><button class="play-btn" onclick="sfxClick();resetRound()">✨ Play Again</button></div>`;}

function startGame(diff){if(!musicStarted)startMusic();S.diff=diff;S.qs=pick(QBANK[diff],Math.min(5,QBANK[diff].length));S.qi=0;S.phase='question';S.busy=false;S.roundCorrect=0;S.roundWrong=0;S.hintsLeft=2;S.hintUsed=false;render();}
function useHint(){sfxHint();S.hintUsed=true;S.hintsLeft--;render();}
function goBack(){if(S.busy)return;sfxBack();stopTimer();S.phase='start';S.bossHp=100;S.phase2=false;render();}
function saveGame(){sfxSave();doSave();}
function answer(choice){
  if(S.busy)return;S.busy=true;stopTimer();
  const q=S.qs[S.qi];
  document.querySelectorAll('.option-btn').forEach(b=>b.style.pointerEvents='none');
  if(choice===q.a){
    document.getElementById('o'+choice).classList.add('correct');S.xp+=10;S.roundCorrect++;S.streak++;
    if(S.streak>S.bestStreak)S.bestStreak=S.streak;const oldLevel=S.level;if(S.xp>=S.level*50)S.level++;
    correctSparks();sfxCorrect();let bonus=0;
    if(S.streak===3){bonus=5;toast('🔥 3 Streak! +5 bonus XP!','#f59e0b');sfxStreak();}
    else if(S.streak===5){bonus=15;toast('⚡ 5 STREAK! +15 bonus XP!','#FFD700');sfxStreak();}
    else toast('Correct!','#27ae60');
    S.xp+=bonus;
    if(S.phase==='boss'){S.bossHp-=25;if(S.bossHp<0)S.bossHp=0;const f=document.getElementById('hpFill');if(f)f.style.width=S.bossHp+'%';const b=document.getElementById('bossEmoji');if(b){b.classList.add('shaking');setTimeout(()=>b.classList.remove('shaking'),450);}}
    checkUnlocks();doSave();
    setTimeout(()=>{S.busy=false;if(S.phase==='boss'&&S.bossHp<=0){sfxVictory();S.phase='win';render();return;}S.qi++;S.hintUsed=false;if(S.level>oldLevel)setTimeout(()=>showLevelUp(S.level),600);advanceQ();},900);
  } else {
    document.getElementById('o'+choice).classList.add('wrong');document.getElementById('o'+q.a).classList.add('correct');S.hp--;S.roundWrong++;S.streak=0;wrongSparks();sfxWrong();toast('Oops!','#e74c3c');doSave();
    setTimeout(()=>{S.busy=false;if(S.hp<=0){sfxDefeat();S.phase='lose';render();return;}S.qi++;S.hintUsed=false;advanceQ();},900);
  }
}
function advanceQ(){if(S.phase==='question'&&S.qi>=S.qs.length){S.phase='summary';render();return;}if(S.phase==='boss'&&S.qi>=S.qs.length){if(!S.phase2&&S.bossHp>0){S.phase2=true;S.qs=pick(QBANK.boss2,QBANK.boss2.length);S.qi=0;sfxBoss();toast('Phase 2!','#FF4500');}else if(S.bossHp>0){S.qs=pick(QBANK.boss,QBANK.boss.length);S.qi=0;}}render();}
function proceedFromSummary(){S.bossHp=100;S.phase2=false;S.hintsLeft=2;S.hintUsed=false;S.qs=pick(QBANK.boss,QBANK.boss.length);S.qi=0;S.phase='boss';sfxBoss();render();}
function resetRound(){S.hp=3;S.xp=0;S.level=1;S.phase='start';S.bossHp=100;S.phase2=false;S.busy=false;S.streak=0;S.hintsLeft=2;S.hintUsed=false;doSave();render();}

window.startGame=startGame;window.answer=answer;window.resetRound=resetRound;window.goBack=goBack;window.saveGame=saveGame;window.toggleMusic=toggleMusic;window.sfxClick=sfxClick;window.confirmName=confirmName;window.useHint=useHint;window.dismissLevelUp=dismissLevelUp;window.proceedFromSummary=proceedFromSummary;window.doInstall=doInstall;window.dismissInstall=dismissInstall;
render();
</script>
</body>
</html>
